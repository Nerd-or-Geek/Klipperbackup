[mcu]
serial: /dev/ttyACM0
restart_method: command

### CONTROL BOARD
[include klipper-prusa-mk3s/mk3s/einsy-rambo.cfg]

### BASE SETUP
[include klipper-prusa-mk3s/mk3s/display.cfg]
[include klipper-prusa-mk3s/mk3s/steppers.cfg]
[include klipper-prusa-mk3s/mk3s/tmc2130.cfg]

### EXTRUSION
# Extruder + Hotend
[include klipper-prusa-mk3s/extruders/prusa.cfg]
[include klipper-prusa-mk3s/hotends/v6.cfg]

[extruder]
pressure_advance: 0.05
nozzle_diameter: 0.4
pid_Kp: 23.862
pid_Ki: 1.020
pid_Kd: 139.595
control: pid
min_temp: 0
max_temp: 305
min_extrude_temp: 0

## copy this from your current setting on Prusa, but make it absolute (removing -)
[probe]
z_offset = 1.055   
# ← your saved value is in the SAVE_CONFIG block below

[printer]
max_accel: 3000          # ← Improved for faster prints (safe on MK3S+ with Klipper)
max_z_velocity: 20
max_z_accel: 300

## Custom bed mesh (upgraded for better accuracy)
[bed_mesh]
probe_count: 5,5         # ← Better than stock 3,3 while still fast with KAMP

# Linear correction (stock)
[include klipper-prusa-mk3s/extruders/linear-correction/linear-correction-0.cfg]

### MACROS
# ================== COMPATIBILITY ALIAS ==================
[gcode_macro PRINT_START]
description: Compatibility alias for old slicer profiles
gcode:
    START_PRINT {rawparams}

# ================== REAL START MACRO (exactly what you asked for) ==================
[gcode_macro START_PRINT]
description: Heat → Mesh Calibrate → Single Purge → Print Immediately
gcode:
    # ================== PARAMETERS FROM SLICER ==================
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}

    G21                          ; metric values
    G90                          ; absolute positioning
    M83                          ; relative extruder moves

    # Start heating in parallel
    M140 S{BED_TEMP}
    M104 S{EXTRUDER_TEMP}

    # Home X and Y first
    G28

    # Wait for bed (critical for PINDA accuracy)
    M190 S{BED_TEMP}

    # Re-home Z with warm bed
    G28 Z

    # Wait for full nozzle temperature
    M109 S{EXTRUDER_TEMP}

    # ================== BED MESH CALIBRATION ==================
    BED_MESH_CLEAR               ; always start with a fresh mesh
    BED_MESH_CALIBRATE AREA_START={params.AREA_START|default("0,0")} AREA_END={params.AREA_END|default("0,0")}

    # ================== SINGLE PURGE LINE AFTER CALIBRATION ==================
    G92 E0
    G1 Z5.0 F3000
    G1 X10 Y10 F5000             ; front-left corner
    G1 Z0.2 F3000
    G1 X140 E22 F600             ; longer prime line
    G1 Y11 F3000
    G1 X10 E8 F600               ; short cleanup pass
    G92 E0
    G1 Z5.0 F3000
    G1 X10 Y10 F5000             ; safe park position

    # Ready - macro ends here so printing starts instantly
    M117 Printing...

# ================== DUMMY MACRO FOR PRUSASLICER SD CARD ==================
[gcode_macro SDCARD_RESET_FILE]
gcode:
    # Silences the common PrusaSlicer/OrcaSlicer error when printing from SD

