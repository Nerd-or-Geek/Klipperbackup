# Prusa MK3s Klipper Config

# The first thing you'll need to do is go through this file and comment out / uncomment
# the files and/or settings you need.

# You'll be able to print just fine with this config as it is, but it is recommended
# that you follow these steps to properly calibrate your printer:

# 0) Sanity check and PID Tuning: https://www.klipper3d.org/Config_checks.html
# 1) Pressure Advance: https://www.klipper3d.org/Pressure_Advance.html
# 2) Skew Correction: https://www.klipper3d.org/skew_correction.html
# 3) Resonance Compensation: https://www.klipper3d.org/Resonance_Compensation.html

# Read more about klipper here: https://www.klipper3d.org/Overview.html

[include timelapse.cfg]
[include KAMP_Settings.cfg]
[exclude_object]
### UI
[include mainsail.cfg]
# [include fluidd.cfg]

[mcu]
# serial: /dev/serial0 # If you are using internal RPI serial port
serial: /dev/ttyACM0 # If you are using RPI via USB connection to printer
restart_method: command

### CONTROL BOARD
[include klipper-prusa-mk3s/mk3s/einsy-rambo.cfg]

### BASE SETUP
[include klipper-prusa-mk3s/mk3s/display.cfg]
[include klipper-prusa-mk3s/mk3s/steppers.cfg]
[include klipper-prusa-mk3s/mk3s/tmc2130.cfg]

### EXTRUSION

# Extruder
[include klipper-prusa-mk3s/extruders/prusa.cfg]
# [include klipper-prusa-mk3s/extruders/bmg.cfg]

# Hotend
[include klipper-prusa-mk3s/hotends/v6.cfg]
# [include klipper-prusa-mk3s/hotends/dragon-standard-flow.cfg]
# [include klipper-prusa-mk3s/hotends/rapido.cfg]

[extruder]
# To tune Pressure Advance see https://www.klipper3d.org/Pressure_Advance.html
# default is already set based on hotend, but you can further improve prints by calibrating it to your nozzle and material
pressure_advance: 0.05
nozzle_diameter: 0.4 # Remember to change this if you change nozzle diameter.
pid_Kp: 23.862
pid_Ki: 1.020
pid_Kd: 139.595

## copy this from your current setting on Prusa, but make it absolute (removing -)
[probe]
#z_offset = 0.685

## For faster printing enable
[printer]
max_accel: 2000
max_z_velocity: 20
max_z_accel: 300

## For stealth mode enable

# [tmc2130 stepper_x]
# interpolate: True
# stealthchop_threshold: 80
# [tmc2130 stepper_y]
# interpolate: True
# stealthchop_threshold: 80
# [tmc2130 stepper_z]
# interpolate: True
# stealthchop_threshold: 80

## Custom bed mest probes
## Prusa has 3x3 or 7x7, you can do any variation you want
[bed_mesh]
probe_count: 3,3

# Linear correction
# Check `extruders/linear-correction` for more informations.
[include klipper-prusa-mk3s/extruders/linear-correction/linear-correction-0.cfg] # Default Prusa linear correction optimized for LDO motors

### MACROS
[include klipper-prusa-mk3s/macros.cfg]

# FIRST RUN: 
# Execute these sequentially in the console, let PID tuning finish before saving
# PID_CALIBRATE HEATER=extruder TARGET=170
# SAVE_CONFIG
# PID_CALIBRATE HEATER=heater_bed TARGET=60
# SAVE_CONFIG

# You can also skip the above setting for stock Prusa and use
[extruder]
control: pid
min_temp: 0
max_temp: 305
min_extrude_temp: 0

# ================== COMPATIBILITY ALIAS (for old slicer profiles) ==================
[gcode_macro PRINT_START]
description: Compatibility alias - forwards to our real macro
gcode:
    START_PRINT {rawparams}

# ================== REAL START MACRO ==================
[gcode_macro START_PRINT]
description: Start Print - Prusa MK3S+ (heat → purge1 → mesh → purge2 → print)
gcode:
    # ================== PARAMETERS FROM SLICER ==================
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}

    # ================== START G-CODE ==================
    G21                          ; metric values
    G90                          ; absolute positioning
    M83                          ; relative extruder moves

    # Start heating bed and nozzle in parallel
    M140 S{BED_TEMP}             ; set bed temperature
    M104 S{EXTRUDER_TEMP}        ; set hotend temperature

    # Home X and Y first
    G28

    # Wait for bed to reach temperature (critical for PINDA)
    M190 S{BED_TEMP}

    # Re-home Z now that the bed is warm
    G28 Z

    # Wait for nozzle to reach temperature BEFORE any purging
    M109 S{EXTRUDER_TEMP}

    # ================== FIRST PURGE LINE (front-left) ==================
    G92 E0
    G1 Z5.0 F3000
    G1 X10 Y10 F5000
    G1 Z0.2 F3000
    G1 X120 E15 F600
    G1 Y11 F3000
    G1 X10 E15 F600
    G92 E0
    G1 E-3 F300                  ; small retract - no pressure during mesh

    # ================== BED MESH (your exact command) ==================
    BED_MESH_CALIBRATE AREA_START={params.AREA_START|default("0,0")} AREA_END={params.AREA_END|default("0,0")}

    # ================== SECOND PURGE LINE (back-left - different place) ==================
    G92 E0
    G1 Z5.0 F3000
    G1 X10 Y195 F5000            ; different location
    G1 Z0.2 F3000
    G1 X120 E15 F600
    G1 Y194 F3000
    G1 X10 E15 F600
    G92 E0
    G1 Z5.0 F3000
    G1 X10 Y10 F5000             ; safe park position

    # Ready - macro ends cleanly so printing starts immediately
    M117 Printing...
